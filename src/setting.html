<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .settings-container {
            width: 80%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
        }
        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }
        .back-btn {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.6);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: white;
            color: black;
        }
        .setting-group {
            margin-bottom: 30px;
        }
        .setting-group h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: #eeeeee;
        }
        select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            background: #222;
            color: white;
            font-size: 1rem;
        }
        .license-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.85rem;
            color: #cccccc;
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <div class="settings-header">
            <h2 id="settings-title">Settings</h2>
            <button class="back-btn" id="back-btn">← Back</button>
        </div>

        <div class="setting-group">
            <h3 id="language-label">Language</h3>
            <select id="language-select">
                <option value="ja">日本語 (Japanese)</option>
                <option value="en">English</option>
            </select>
        </div>

        <div class="setting-group">
            <h3>Appearance (再起動が必要です)</h3>
            <div class="setting-item">
                <div class="setting-item-label">
                    <span>Dark Mode (Force WebContents Dark)</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="dark-mode-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="setting-group">
            <h3>AI Configuration</h3>
            <h3 id="port-label">Live Server Port (0 for auto)</h3>
            <input type="number" id="live-port-input" value="0" min="0" max="65535" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc; background: #222; color: white; font-size: 1rem; width: 100px;">
        </div>

        <div class="setting-group">
            <h3 id="ai-key-label">Gemini API Key (For AI Autocomplete)</h3>
            <input type="password" id="gemini-key-input" placeholder="AI Studio API Key" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc; background: #222; color: white; font-size: 1rem; width: 100%; box-sizing: border-box;">
        </div>

        <div class="setting-group">
            <h3 id="ai-model-label">AI Model</h3>
            <select id="ai-model-select">
                <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite</option>
                <option value="gemini-3-flash">gemini-3-flash</option>
                <option value="gemini-3-pro">gemini-3-pro</option>
                <option value="gemini-2.0-flash">gemini-2.0-flash</option>
            </select>
        </div>

        <div class="setting-group">
            <h3 id="license-title">License Information</h3>
            <div class="license-box" id="license-text">Loading...</div>
        </div>
    </div>

    <script src="setting.js"></script>
</body>
</html>
