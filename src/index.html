<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TRENDcreate Browser</title>
    <link rel="stylesheet" href="browser.css">
    <link rel="stylesheet" href="android.css" media="(max-width: 768px)">
    <script>
        // If we are in Capacitor (mobile) or a standard browser where require is not defined, 
        // the Electron <webview> and browser shell won't work. Redirect to home.html.
        if (typeof require === 'undefined' || window.Capacitor) {
            window.location.replace('home.html');
        }

        window.addEventListener('error', (event) => {
            if (typeof require !== 'undefined') {
                const { ipcRenderer } = require('electron');
                ipcRenderer.send('console-message', { type: 'error', message: event.error ? event.error.stack : event.message });
            }
        });
        window.addEventListener('unhandledrejection', (event) => {
            if (typeof require !== 'undefined') {
                const { ipcRenderer } = require('electron');
                ipcRenderer.send('console-message', { type: 'error', message: event.reason ? event.reason.stack : event.reason });
            }
        });
    </script>
    <script src="theme-loader.js"></script>
</head>

<body>
    <div id="browser-ui">
        <div id="tabs-container">
            <div id="tabs"></div>
            <button id="new-tab-btn" title="New Tab"><svg viewBox="0 0 24 24" width="16" height="16"
                    stroke="currentColor" stroke-width="2" fill="none">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg></button>
            <button id="portfolio-btn" title="Open Portfolio"><svg viewBox="0 0 24 24" width="16" height="16"
                    stroke="currentColor" stroke-width="2" fill="none">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg></button>
            <button id="ide-toggle-btn" title="Open IDE in New Tab"><svg viewBox="0 0 24 24" width="16" height="16"
                    stroke="currentColor" stroke-width="2" fill="none">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg></button>
        </div>
        <div id="nav-bar">
            <button id="hamburger-menu-btn" class="nav-btn" style="display:none;" title="Menu">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <button id="back-btn" class="nav-btn desktop-nav" disabled title="Back"><svg viewBox="0 0 24 24" width="16" height="16"
                    stroke="currentColor" stroke-width="2" fill="none">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg></button>
            <button id="forward-btn" class="nav-btn" disabled title="Forward"><svg viewBox="0 0 24 24" width="16"
                    height="16" stroke="currentColor" stroke-width="2" fill="none">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg></button>
            <button id="reload-btn" class="nav-btn" title="Reload"><svg viewBox="0 0 24 24" width="16" height="16"
                    stroke="currentColor" stroke-width="2" fill="none">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg></button>
            <div id="url-bar-container">
                <input type="text" id="url-bar" placeholder="Search or enter URL" autocomplete="off">
                <button id="bookmark-star-btn" class="nav-btn" title="Bookmark this page" style="position:absolute; right:5px; top:50%; transform:translateY(-50%); background:transparent; border:none; color:#8ab4f8; display:none;">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                </button>
                <div id="suggestions-box"></div>
            </div>
            <button id="bookmarks-list-btn" class="nav-btn" title="Bookmarks"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg></button>
            <button id="history-btn" class="nav-btn" title="History"><svg viewBox="0 0 24 24" width="16" height="16"
                    stroke="currentColor" stroke-width="2" fill="none">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg></button>
            <button id="devtools-btn" class="nav-btn" title="Open DevTools"><svg viewBox="0 0 24 24" width="16"
                    height="16" stroke="currentColor" stroke-width="2" fill="none">
                    <path
                        d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z">
                    </path>
                </svg></button>
            <button id="settings-btn" class="nav-btn" title="Settings"><svg viewBox="0 0 24 24" width="16" height="16"
                    stroke="currentColor" stroke-width="2" fill="none">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg></button>
            <div id="profile-container" style="position:relative;">
                <button id="profile-btn" class="nav-btn" title="Profiles">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span id="profile-name" style="margin-left:4px; font-size:12px; max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">Default</span>
                </button>
                <div id="profile-menu" class="hidden"></div>
            </div>
        </div>
    </div>

    <!-- Find in page bar -->
    <div id="find-bar" class="hidden">
        <input type="text" id="find-input" placeholder="ページ内を検索" autocomplete="off">
        <span id="find-count"></span>
        <button id="find-prev" class="find-btn" title="前へ">▲</button>
        <button id="find-next" class="find-btn" title="次へ">▼</button>
        <button id="find-close" class="find-btn" title="閉じる">✕</button>
    </div>

    <!-- Mobile Hamburger Menu Overlay -->
    <div id="mobile-menu-overlay" style="display:none;">
        <div id="mobile-menu-content">
            <button id="mobile-close-menu-btn" class="nav-btn" style="align-self: flex-end; margin-bottom: 10px;">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <button id="mobile-history-btn" class="modern-btn">History</button>
            <button id="mobile-bookmarks-btn" class="modern-btn">Bookmarks</button>
            <button id="mobile-settings-btn" class="modern-btn">Settings</button>
            <button id="mobile-ide-toggle-btn" class="modern-btn" style="margin-top:auto;">Toggle IDE</button>
        </div>
    </div>

    <main id="workspace">
        <section id="webviews-container"></section>
        <section id="ide-panel" class="ide-hidden" aria-label="IDE">
            <div id="ide-activity-bar">
                <button id="activity-files-btn" class="activity-btn active" title="Explorer"><svg viewBox="0 0 24 24"
                        width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg></button>
                <button id="activity-console-btn" class="activity-btn" title="Console"><svg viewBox="0 0 24 24"
                        width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none">
                        <path
                            d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                        </path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg></button>
            </div>
            <div id="ide-sidebar">
                <div class="ide-toolbar">
                    <button id="open-folder-btn" title="Open Folder"><svg viewBox="0 0 24 24" width="16" height="16"
                            stroke="currentColor" stroke-width="2" fill="none">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                            </path>
                        </svg></button>
                    <button id="new-file-btn" title="New File"><svg viewBox="0 0 24 24" width="16" height="16"
                            stroke="currentColor" stroke-width="2" fill="none">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg></button>
                    <button id="save-file-btn" title="Save File"><svg viewBox="0 0 24 24" width="16" height="16"
                            stroke="currentColor" stroke-width="2" fill="none">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg></button>
                    <button id="live-server-btn" title="Start Live Server"><svg viewBox="0 0 24 24" width="16"
                            height="16" stroke="currentColor" stroke-width="2" fill="none">
                            <circle cx="12" cy="12" r="2"></circle>
                            <path
                                d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14">
                            </path>
                        </svg></button>
                    <div style="width: 1px; height: 16px; background: rgba(255,255,255,0.2); margin: 0 4px;"></div>
                    <button id="novel-plot-btn" title="新規プロット作成"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg></button>
                    <button id="novel-setting-btn" title="新規世界観設定作成"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
                    <button id="writing-mode-btn" title="Toggle Writing Mode (Focus Mode)"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
                </div>
                <div id="file-tree-container">
                    <div id="project-root">No folder selected</div>
                    <div id="file-tree"></div>
                </div>
                <div id="ide-sidebar-console" class="hidden-tab"></div>
                <div id="license-note">Editor: Monaco Editor, MIT License (c) Microsoft Corporation.</div>
            </div>
            <div id="sidebar-resizer" class="ide-resizer" title="Adjust sidebar width"></div>
            <div id="ide-main">
                <div id="editor-header">
                    <span id="active-file-label">untitled.html</span>
                    <div id="ide-view-toggle" class="view-toggle hidden">
                        <button id="toggle-preview-btn">Preview: OFF</button>
                        <button id="toggle-writing-direction-btn" style="display: none;">横書き (標準)</button>
                        <button id="toggle-focus-mode-btn" style="display: none;">集中モード: OFF</button>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <span id="char-count" style="display: none; font-size: 11px; color: #a8c7fa; font-weight: bold;">0 chars</span>
                        <button id="ai-assist-toggle-btn" class="nav-btn" style="display: none; height: 24px; font-size: 11px; padding: 0 8px; border-radius: 4px; color: #8ab4f8; border: 1px solid rgba(138,180,248,0.5);" title="Toggle AI Assist in Writing Mode">AI: ON</button>
                        <button id="ai-suggest-btn" class="nav-btn"
                            style="height: 24px; font-size: 11px; padding: 0 8px; border-radius: 4px; color: #8ab4f8; border: 1px solid rgba(138,180,248,0.5);"
                            title="Trigger AI Code Suggestion (Ctrl+Enter)">☆</button>
                        <span id="save-status">Saved</span>
                    </div>
                </div>
                <div id="ide-split">
                    <div id="monaco-editor" style="flex: 1;"></div>
                    <div id="preview-resizer" class="ide-resizer" title="Adjust preview width" style="display: none;"></div>
                    <div id="preview-container" style="display: none;">
                        <div id="preview-header">
                            <span id="preview-title">Live Preview</span>
                            <a href="#" id="open-external-btn" title="Open in Browser">↗</a>
                        </div>
                        <webview id="preview-frame" style="flex: 1; border: none; background: white;" webpreferences="contextIsolation=false" src="about:blank"></webview>
                    </div>
                    <textarea id="novel-vertical-editor" style="display: none; flex: 1; padding: 2rem; writing-mode: vertical-rl; text-orientation: upright; font-family: 'Noto Serif JP', serif; font-size: 16px; line-height: 2; resize: none; border: none; outline: none; background: #1e1e1e; color: #d4d4d4; overflow-x: auto; overflow-y: hidden;"></textarea>
                </div>
            </div>
        </section>
    </main>

    <!-- Link Hover Overlay -->
    <div id="link-hover-overlay" class="link-hover-overlay hidden"></div>

    <script>
        window.nodeRequire = require;
    </script>
    <script src="../node_modules/monaco-editor/min/vs/loader.js"></script>

    <!-- Rename Modal -->
    <div id="rename-modal" class="modal hidden">
        <div class="modal-content">
            <h3 style="margin-top: 0;">名前を変更</h3>
            <input type="text" id="rename-input"
                style="width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background: #fff; color: #000;">
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                <button id="rename-cancel"
                    style="padding: 6px 12px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #eee;">キャンセル</button>
                <button id="rename-confirm"
                    style="padding: 6px 12px; cursor: pointer; border: 1px solid #007acc; border-radius: 4px; background: #007acc; color: white;">変更</button>
            </div>
        </div>
    </div>

    <!-- Generic Prompt Modal -->
    <div id="prompt-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="prompt-modal-title" style="margin-top: 0;">入力</h3>
            <input type="text" id="prompt-modal-input"
                style="width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background: #fff; color: #000;">
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                <button id="prompt-modal-cancel"
                    style="padding: 6px 12px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #eee;">キャンセル</button>
                <button id="prompt-modal-confirm"
                    style="padding: 6px 12px; cursor: pointer; border: 1px solid #007acc; border-radius: 4px; background: #007acc; color: white;">OK</button>
            </div>
        </div>
    </div>

    <!-- Download Toast -->
    <div id="download-toast" class="hidden">
        <div class="download-info">
            <div id="download-filename" class="download-filename">Downloading...</div>
            <div id="download-status" class="download-status">0%</div>
        </div>
        <div class="download-progress-bar">
            <div id="download-progress-fill" class="download-progress-fill"></div>
        </div>
    </div>

    <script src="browser.js"></script>
</body>

</html>
