<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Portfolio - TRENDcreate Browser</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="android.css" media="(max-width: 768px)">
    <script src="theme-loader.js"></script>
    <style>
        body {
            /* Inherit from style.css */
            overflow-y: auto;
        }

        .portfolio-page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .portfolio-page-header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modern-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .modern-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>
    <div id="background"></div>
    <div class="container" style="justify-content: flex-start; padding: 40px; width: 100%;">
        <div class="portfolio-page-header" style="width: 100%;">
            <h1 id="portfolio-title">Local Projects Portfolio</h1>
            <button id="open-workspace-btn" class="modern-btn">Change Workspace</button>
        </div>

        <div id="breadcrumbs" style="width: 100%; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
            <button id="go-up-btn" class="modern-btn" style="padding: 5px 10px; font-size: 0.9rem;"
                disabled>path</button>
            <span id="current-path-label" style="font-size: 1.1rem; color: #ccc;"></span>
        </div>

        <div class="portfolio-grid" id="portfolio-grid" style="width: 100%;">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script src="portfolio.js"></script>
</body>

</html>
