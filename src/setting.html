<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
    <script src="theme-loader.js"></script>
    <style>
        body {
            background-color: var(--bg-color, #121212);
            color: var(--primary-color, #ffffff);
            overflow-y: hidden;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #background {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: -2;
        }

        #background.loaded {
            opacity: 1;
        }

        #background::after {
            content: "";
            position: absolute;
            inset: 0;
            background: var(--bg-overlay, rgba(0, 0, 0, 0.5));
            z-index: -1;
        }

        .settings-container {
            width: 85%;
            max-width: 900px;
            height: 85vh;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(16px);
            display: flex;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border: none;
            padding: 15px 20px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-left-color: var(--accent-color, #007acc);
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 20px;
        }

        .back-btn {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .back-btn:hover {
            background: white;
            color: black;
        }

        .content-area {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .setting-group {
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .setting-group h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: #eeeeee;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-row label {
            width: 200px;
            font-weight: bold;
        }

        .form-row input[type="text"],
        .form-row input[type="number"],
        .form-row input[type="password"],
        .form-row select {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1rem;
        }

        .form-row input[type="color"] {
            width: 50px;
            height: 40px;
            padding: 2px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            cursor: pointer;
        }

        .form-row input:focus,
        .form-row select:focus {
            outline: none;
            border-color: var(--accent-color, #007acc);
        }

        .license-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.85rem;
            color: #cccccc;
        }

        .theme-card {
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-card:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .theme-card.active {
            border-color: var(--accent-color, #007acc);
            background: rgba(255, 255, 255, 0.15);
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div id="background"></div>
    <div class="settings-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header" id="settings-title">Settings</div>
            <button class="tab-btn active" data-tab="tab-general">General</button>
            <button class="tab-btn" data-tab="tab-theme">Theme</button>
            <button class="tab-btn" data-tab="tab-ai">AI Config</button>
            <button class="tab-btn" data-tab="tab-license">Licenses</button>

            <div class="sidebar-footer">
                <button class="back-btn" id="back-btn">ↁEBack</button>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content-area">

            <!-- General Tab -->
            <div id="tab-general" class="tab-content active">
                <div class="setting-group">
                    <h3 id="language-label">Language</h3>
                    <div class="form-row">
                        <select id="language-select">
                            <option value="ja">日本語(Japanese)</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                </div>
                <div class="setting-group">
                    <h3 id="port-label">Live Server Port</h3>
                    <div class="form-row">
                        <label>Port (0 for auto)</label>
                        <input type="number" id="live-port-input" value="0" min="0" max="65535">
                    </div>
                </div>
                <div class="setting-group">
                    <h3>UI Layout</h3>
                    <div class="setting-item" style="display:flex; align-items:center;">
                        <span style="margin-right:15px; font-weight:bold;">Vertical Tabs (タブを縦に並べる)</span>
                        <label class="switch">
                            <input type="checkbox" id="vertical-tabs-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Theme Tab -->
            <div id="tab-theme" class="tab-content">
                <div class="setting-group">
                    <h3>Theme Presets</h3>
                    <div class="theme-grid" id="theme-presets-container">
                        <div class="theme-card active" data-preset="dark">Dark</div>
                        <div class="theme-card" data-preset="light">Light</div>
                        <div class="theme-card" data-preset="glass">Glass</div>
                        <div class="theme-card" data-preset="cyberpunk">Cyberpunk</div>
                        <div class="theme-card" data-preset="aero">Aero (Glass)</div>
                    </div>
                </div>

                <div class="setting-group">
                    <h3>Customization</h3>
                    <div class="form-row">
                        <label>Background Image URL</label>
                        <input type="text" id="theme-bg-image" placeholder="https://example.com/image.jpg">
                    </div>
                    <div class="form-row">
                        <label>Primary Text Color</label>
                        <input type="color" id="theme-primary-color" value="#ffffff">
                    </div>
                    <div class="form-row">
                        <label>Background Color</label>
                        <input type="color" id="theme-bg-color" value="#121212">
                    </div>
                    <div class="form-row">
                        <label>Accent Color</label>
                        <input type="color" id="theme-accent-color" value="#007acc">
                    </div>
                    <div class="form-row">
                        <label>Overlay Opacity</label>
                        <input type="range" id="theme-overlay-opacity" min="0" max="1" step="0.05" value="0.5"
                            style="flex:1;">
                    </div>
                </div>

                <div class="setting-group">
                    <h3>System Appearance (再起動が必要です)</h3>
                    <div class="setting-item" style="display:flex; align-items:center;">
                        <span style="margin-right:15px; font-weight:bold;">Force WebContents Dark Mode</span>
                        <label class="switch">
                            <input type="checkbox" id="dark-mode-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- AI Tab -->
            <div id="tab-ai" class="tab-content">
                <div class="setting-group">
                    <h3 id="ai-key-label">Gemini API Key</h3>
                    <div class="form-row">
                        <input type="password" id="gemini-key-input" placeholder="AI Studio API Key">
                    </div>
                </div>
                <div class="setting-group">
                    <h3 id="ai-model-label">AI Model</h3>
                    <div class="form-row">
                        <select id="ai-model-select">
                            <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite</option>
                            <option value="gemini-3-flash">gemini-3-flash</option>
                            <option value="gemini-3-pro">gemini-3-pro</option>
                            <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- License Tab -->
            <div id="tab-license" class="tab-content">
                <div class="setting-group">
                    <h3 id="license-title">Open Source Licenses</h3>
                    <div class="license-box" id="license-text">Loading...</div>
                </div>
            </div>

        </div>
    </div>

    <script src="setting.js"></script>
</body>

</html>
